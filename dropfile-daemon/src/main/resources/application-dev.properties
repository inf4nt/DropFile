spring.application.name=dropfile-daemon
dropfile.daemon.port=28282
dropfile.daemon.token=daemon-token-dev

file.manifest.builder.chunk.size=4194304
file.manifest.builder.buffer.size=65536

download.ochestrator.thread-size=10
download.procedure.thread-size=2

download.procedure.manifest.call.timeout-millis=300000
download.procedure.chunk.call.timeout-millis=120000

compress.tunnel.active=true
compress.tunnel.level=3

spring.mvc.async.request-timeout=300000